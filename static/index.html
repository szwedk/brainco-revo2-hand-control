<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revo2Touch · BrainCo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;
  --surface:#0d0e16;
  --surface2:#12131e;
  --surface3:#181924;
  --border:rgba(255,255,255,.055);
  --border-hi:rgba(255,255,255,.11);
  --accent:#7c6eff;
  --accent-dim:rgba(124,110,255,.12);
  --accent-glow:rgba(124,110,255,.4);
  --text:#e4e6f8;
  --text2:#7e88ad;
  --muted:#3d4260;
  --green:#00d68d;
  --yellow:#f5c518;
  --red:#ff3a58;
  --r:11px;
  --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale
}

/* ── Header ──────────────────────────────────────────── */
header{
  display:flex;align-items:center;padding:0 22px;height:48px;
  background:rgba(7,8,13,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:50
}
.hlogo{display:flex;align-items:center;gap:10px;margin-right:22px}
.hlogo h1{font-size:13.5px;font-weight:600;letter-spacing:-.025em;color:var(--text)}
.hsep{width:1px;height:18px;background:var(--border-hi);opacity:.5;margin:0 18px;flex-shrink:0}
.hbadge{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text2);font-weight:500}
.hbadge-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .4s}
.hbadge-dot.ok{background:var(--green);box-shadow:0 0 9px var(--green)}
.hbadge-dot.err{background:var(--red);box-shadow:0 0 7px var(--red)}
.hbadge-text{transition:color .4s}
.hbadge-text.ok{color:var(--green)}
.hbadge-text.err{color:var(--red)}
.hdevinfo{font-size:11px;color:var(--text2);font-weight:400;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.65}
.hright{margin-left:auto;display:flex;align-items:center;gap:14px}
.hhz{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;font-weight:500;
  letter-spacing:.02em;min-width:46px;text-align:right}
#mirrorBtn{
  display:flex;align-items:center;gap:7px;padding:0 16px;height:30px;
  border-radius:15px;background:var(--surface2);border:1px solid var(--border-hi);
  color:var(--text2);font-size:11.5px;font-weight:500;cursor:pointer;
  transition:all .2s;letter-spacing:.005em;font-family:inherit
}
#mirrorBtn:hover{border-color:rgba(124,110,255,.5);color:var(--text);background:var(--accent-dim)}
#mirrorBtn.active{background:rgba(124,110,255,.1);border-color:rgba(124,110,255,.45);color:var(--accent)}
#mirrorBtn .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .3s;flex-shrink:0}
#mirrorBtn.active .dot{background:var(--red);box-shadow:0 0 7px var(--red);animation:breathe .9s ease-in-out infinite}
.badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;
  background:#1a1c28;color:var(--muted);transition:all .4s}
.badge.ok{background:#0b2218;color:var(--green)}
.badge.err{background:#280d14;color:var(--red)}

/* ── Section labels ──────────────────────────────────── */
.ptitle{
  font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;flex-shrink:0;
  display:flex;align-items:center;gap:8px;opacity:.8
}
.ptitle::before{
  content:'';display:block;width:2px;height:11px;border-radius:2px;
  background:var(--accent);opacity:.7;flex-shrink:0
}

/* ── Workspace ───────────────────────────────────────── */
.workspace{flex:1;display:flex;overflow:hidden;min-height:0;background:var(--bg)}
.col-handle{
  width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;
  transition:background .15s;user-select:none;-webkit-user-select:none
}
.col-handle:hover,.col-handle.dragging{background:var(--accent)}

/* ── Left column ─────────────────────────────────────── */
.left-col{
  display:flex;flex-direction:column;background:var(--bg);
  padding:0;overflow:hidden;min-height:0;flex-shrink:0
}
.sensor-panel{
  background:var(--bg);flex:1;padding:14px 15px;
  display:flex;flex-direction:column;overflow:hidden;min-height:0;
  border-bottom:1px solid var(--border)
}
.fingers-grid{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:8px;flex:1;min-height:0
}
.fc{
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--c);border-radius:var(--r);
  padding:11px 11px;display:flex;flex-direction:column;gap:5px;
  position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s;
  box-shadow:0 1px 4px rgba(0,0,0,.35)
}
.fc.contact{
  box-shadow:0 0 22px color-mix(in srgb,var(--c) 18%,transparent),0 1px 4px rgba(0,0,0,.35);
  border-color:color-mix(in srgb,var(--c) 55%,var(--border))
}
.fc .glow{
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,var(--c) 0%,transparent 65%);
  opacity:0;transition:opacity .25s
}
.fc.contact .glow{opacity:.07}
.flabel{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--c,var(--text2));display:flex;align-items:center;justify-content:space-between
}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);
  box-shadow:0 0 4px var(--green);transition:all .3s;flex-shrink:0}
.sdot.w{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.sdot.e{background:var(--red);box-shadow:0 0 4px var(--red)}
.arc-svg{width:50px;height:50px;flex-shrink:0}
.arc-track{fill:none;stroke:var(--surface2);stroke-width:3.5}
.arc-fill{fill:none;stroke-width:3.5;stroke-linecap:round;stroke:var(--c,var(--accent));
  transition:stroke-dashoffset .12s,stroke .15s}
.nfsv-text{font-weight:900;font-family:'Inter',sans-serif}
.nfv{font-size:18px;font-weight:700;line-height:1;transition:color .15s;font-variant-numeric:tabular-nums}
.tval{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums}
.fc-row{display:flex;align-items:center;gap:6px}
.prox-wrap{width:100%}
.prox-track{width:100%;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prox-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--c,var(--accent)),transparent);transition:width .1s}
.prox-lbl{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:2px}

.finger-panel{
  background:var(--bg);flex:1;min-height:0;padding:14px 15px;
  display:flex;flex-direction:column;overflow:hidden
}
.finger-tiles{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:8px;flex:1;min-height:0
}
.ftile{
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--c);border-radius:var(--r);
  padding:11px 11px;display:flex;flex-direction:column;gap:4px;
  transition:box-shadow .2s,border-color .2s;overflow:hidden;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.3)
}
.ftile:hover{
  box-shadow:0 0 20px color-mix(in srgb,var(--c) 16%,transparent),0 1px 4px rgba(0,0,0,.3);
  border-color:color-mix(in srgb,var(--c) 50%,var(--border))
}
.ftile:active{transform:scale(.98)}
.ftile-top{display:flex;justify-content:space-between;align-items:center}
.ftile-name{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--c)}
.ftile-dot{width:5px;height:5px;border-radius:50%;background:var(--surface2);transition:all .25s}
.ftile-dot.active{background:var(--c);box-shadow:0 0 6px var(--c)}
.ftile-val{
  font-size:30px;font-weight:600;line-height:1;color:var(--text);
  font-variant-numeric:tabular-nums;letter-spacing:-.03em
}
.ftile-row{display:flex;justify-content:space-between;align-items:center}
.ftile-pct{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums}
.ftile-max{font-size:9px;color:var(--muted)}
.ftile-track{width:100%;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin:2px 0}
.ftile-fill{height:100%;border-radius:2px;background:var(--c);transition:width .07s;opacity:.75}
input.ftile-slider{
  width:100%;cursor:pointer;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:4px;background:var(--surface2);outline:none;border:none;margin-top:auto
}
input.ftile-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--c);
  cursor:pointer;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 20%,transparent),0 2px 6px rgba(0,0,0,.5)
}
input.ftile-slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;border:none;background:var(--c);cursor:pointer
}

/* ── Center column ───────────────────────────────────── */
.center-col{
  position:relative;display:flex;flex-direction:column;overflow:hidden;min-height:0;
  background:var(--bg);flex:1;min-width:160px
}
.hand-header{
  padding:14px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0
}
.hand-hint{font-size:9px;color:var(--muted);margin-left:auto;letter-spacing:.03em}
.hand-area{flex:1;position:relative;min-height:0;overflow:hidden}
#hand-svg{position:absolute;inset:0;width:100%;height:100%}
#hand-tooltip{
  position:fixed;background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--r-sm);padding:6px 10px;font-size:11px;font-weight:600;color:var(--text);
  pointer-events:none;display:none;z-index:100;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.04)
}

/* ── Right column ────────────────────────────────────── */
.right-col{
  display:flex;flex-direction:column;background:var(--bg);
  padding:0;overflow:hidden;min-height:0;flex-shrink:0
}
.poses-section{
  background:var(--bg);flex:1;min-height:120px;padding:0;
  display:flex;flex-direction:row;overflow:hidden
}
.row-handle{
  height:4px;background:var(--border);cursor:row-resize;flex-shrink:0;
  transition:background .15s;user-select:none;-webkit-user-select:none
}
.row-handle:hover,.row-handle.dragging{background:var(--accent)}
.poses-left{
  padding:14px 15px;display:flex;flex-direction:column;
  overflow-y:auto;flex:1;min-width:0;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent
}
.poses-right{
  padding:14px 15px;display:flex;flex-direction:column;
  overflow:hidden;flex:1;min-width:0;background:var(--bg);
  border-left:1px solid var(--border)
}
.pose-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
.pbtn{
  padding:8px 4px;border-radius:var(--r-sm);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:10.5px;font-weight:500;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:5px;font-family:inherit;
  box-shadow:0 1px 3px rgba(0,0,0,.3)
}
.pbtn:hover{
  background:var(--surface2);border-color:var(--border-hi);
  color:var(--text);box-shadow:0 0 16px rgba(124,110,255,.1),0 1px 3px rgba(0,0,0,.3)
}
.pbtn:active{transform:scale(.96);box-shadow:none}
.pbtn.wide{grid-column:span 2}
.pbtn .em{font-size:13px}
.pbtn.running{
  border-color:color-mix(in srgb,var(--green) 55%,var(--border));
  color:var(--green);background:color-mix(in srgb,var(--green) 7%,var(--surface))
}
.seq-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;flex-shrink:0}
.seq-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.key-hints{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;flex-shrink:0;align-items:center}
.kh{
  background:var(--surface);border:1px solid var(--border-hi);border-radius:4px;
  padding:1px 6px;font-size:9px;color:var(--text2);font-family:monospace;font-weight:600
}
.code-editor{
  width:100%;flex:1;min-height:0;resize:none;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:'Fira Code','Cascadia Code','Courier New',monospace;font-size:11px;
  padding:10px;outline:none;line-height:1.65;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent
}
.code-editor:focus{
  border-color:rgba(124,110,255,.4);
  box-shadow:0 0 0 3px rgba(124,110,255,.07)
}
.run-btn{
  margin-top:8px;padding:7px 0;border-radius:var(--r-sm);
  background:var(--accent);border:none;color:#fff;
  font-size:11.5px;font-weight:600;cursor:pointer;flex-shrink:0;
  transition:background .15s,transform .1s,box-shadow .15s;font-family:inherit;
  letter-spacing:.01em
}
.run-btn:hover{background:#6b58ee;box-shadow:0 4px 20px rgba(124,110,255,.4)}
.run-btn:active{transform:scale(.97);box-shadow:none}
.run-output{
  margin-top:6px;font-size:10px;color:var(--text2);font-family:monospace;
  max-height:44px;overflow-y:auto;flex-shrink:0;line-height:1.5;word-break:break-all
}
.chart-section{
  background:var(--bg);flex:1;min-height:80px;padding:14px 15px;
  display:flex;flex-direction:column;overflow:hidden;
  border-top:1px solid var(--border)
}
.chart-wrap{flex:1;position:relative;min-height:0}
canvas#chart{
  position:absolute;inset:0;width:100%;height:100%;border-radius:var(--r-sm);
  background:var(--surface);border:1px solid var(--border)
}
.cleg{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;flex-shrink:0}
.cli{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.cld{width:6px;height:6px;border-radius:50%}

/* ── SVG hand ────────────────────────────────────────── */
.palm-label{fill:var(--muted);font-size:7px;text-anchor:middle;
  font-family:'Inter',sans-serif;pointer-events:none}
.finger-group{cursor:ns-resize;transition:filter .15s}
.finger-group:hover{filter:brightness(1.6) drop-shadow(0 0 6px currentColor)}

/* ── Animations ──────────────────────────────────────── */
@keyframes breathe{0%,100%{opacity:.65}50%{opacity:1}}
.idle-breathe{animation:breathe 3s ease-in-out infinite}

/* ── Mirror ──────────────────────────────────────────── */
.mirror-pip{
  position:absolute;bottom:14px;right:14px;width:196px;height:148px;
  border-radius:12px;overflow:hidden;
  border:1.5px solid rgba(124,110,255,.45);z-index:20;
  display:none;box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05)
}
.mirror-pip.active{display:block}
#pipVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#pipCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mirror-badge{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(124,110,255,.14);border:1px solid rgba(124,110,255,.4);
  border-radius:20px;padding:4px 14px;font-size:9px;font-weight:700;color:var(--accent);
  letter-spacing:.12em;text-transform:uppercase;display:none;z-index:20;pointer-events:none;
  backdrop-filter:blur(8px)
}
.mirror-badge.active{display:block}
.mirror-smoothing{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);
  flex-shrink:0;margin-left:auto}
.mirror-smoothing label{cursor:pointer;color:var(--muted)}
.mirror-smoothing input{width:60px;cursor:pointer;accent-color:var(--accent)}
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <rect x="7" y="1" width="3" height="11" rx="1.5" fill="#7c6eff" opacity=".9"/>
      <rect x="11" y="0" width="3" height="12" rx="1.5" fill="#a78bfa" opacity=".9"/>
      <rect x="3" y="3" width="3" height="9" rx="1.5" fill="#60a5fa" opacity=".9"/>
      <rect x="15" y="4" width="3" height="8" rx="1.5" fill="#f5c518" opacity=".9"/>
      <rect x="3" y="13" width="15" height="5" rx="2" fill="#12131e"/>
    </svg>
    <h1>Revo2Touch</h1>
  </div>
  <div class="hsep"></div>
  <div class="hbadge">
    <div class="hbadge-dot" id="hbdot"></div>
    <span class="hbadge-text" id="hbtext">Connecting&hellip;</span>
  </div>
  <div class="hsep"></div>
  <div class="hdevinfo" id="devinfo"></div>
  <div class="hright">
    <span class="hhz" id="hzlbl">&mdash; Hz</span>
    <div class="hsep"></div>
    <button id="mirrorBtn" onclick="toggleMirror()"><span class="dot"></span>Mirror</button>
  </div>
</header>

<div class="workspace" id="workspace">

  <!-- LEFT: sensor + finger tiles -->
  <div class="left-col" id="lcol" style="width:255px">
    <div class="sensor-panel">
      <div class="ptitle">Tactile Sensors</div>
      <div class="fingers-grid" id="fgrid"></div>
    </div>
    <div class="finger-panel">
      <div class="ptitle">Finger Control</div>
      <div class="finger-tiles" id="ftiles"></div>
    </div>
  </div>

  <div class="col-handle" id="ch1"></div>

  <!-- CENTER: hero hand -->
  <div class="center-col" id="ccol" style="width:280px;flex:none">
    <div class="hand-header">
      <div class="ptitle">Hand Control</div>
      <span class="hand-hint">drag &middot; click to toggle &middot; scroll to adjust</span>
    </div>
    <div class="hand-area">
      <svg id="hand-svg" viewBox="-18 0 218 320" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="mirror-pip" id="mirrorPip">
        <video id="pipVideo" autoplay muted playsinline></video>
        <canvas id="pipCanvas"></canvas>
      </div>
      <div class="mirror-badge" id="mirrorBadge">◉ Mirror Active</div>
    </div>
  </div>

  <div class="col-handle" id="ch2"></div>

  <!-- RIGHT: poses + chart -->
  <div class="right-col" id="rcol" style="flex:1;min-width:200px">
    <div class="poses-section">
      <div class="poses-left">
        <div class="ptitle">Poses</div>
        <div class="pose-grid">
          <button class="pbtn" onclick="sendPose('open')"><span class="em">&#x1f590;&#xfe0f;</span>Open</button>
          <button class="pbtn" onclick="sendPose('fist')"><span class="em">&#x270a;</span>Fist</button>
          <button class="pbtn" onclick="sendPose('point')"><span class="em">&#x261d;&#xfe0f;</span>Point</button>
          <button class="pbtn" onclick="sendPose('peace')"><span class="em">&#x270c;&#xfe0f;</span>Peace</button>
          <button class="pbtn" onclick="sendPose('pinch')"><span class="em">&#x1f90f;</span>Pinch</button>
          <button class="pbtn" onclick="sendPose('ok')"><span class="em">&#x1f44c;</span>OK</button>
          <button class="pbtn" onclick="sendPose('gun')"><span class="em">&#x1f52b;</span>Gun</button>
          <button class="pbtn" onclick="sendPose('claw')"><span class="em">&#x1f9be;</span>Claw</button>
          <button class="pbtn" onclick="sendPose('relax')"><span class="em">&#x1f4a4;</span>Relax</button>
          <button class="pbtn" onclick="sendPose('rock')"><span class="em">&#x1f918;</span>Rock</button>
          <button class="pbtn" onclick="sendPose('three')"><span class="em">3&#xfe0f;&#x20e3;</span>Three</button>
          <button class="pbtn wide" id="demobtn" onclick="runDemo()"><span class="em">&#x25b6;</span>Run Demo</button>
        </div>
        <div class="seq-bar"><div class="seq-fill" id="seqfill" style="width:0%"></div></div>
        <div class="key-hints">
          <span class="kh">O</span><span style="font-size:9px;color:var(--text2)">Open</span>
          <span class="kh">F</span><span style="font-size:9px;color:var(--text2)">Fist</span>
          <span class="kh">P</span><span style="font-size:9px;color:var(--text2)">Point</span>
          <span class="kh">V</span><span style="font-size:9px;color:var(--text2)">Peace</span>
          <span class="kh">N</span><span style="font-size:9px;color:var(--text2)">Pinch</span>
          <span class="kh">K</span><span style="font-size:9px;color:var(--text2)">OK</span>
        </div>
      </div>
      <div class="poses-right">
        <div class="ptitle">Custom Code</div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false">// positions: [thumb,thaux,index,middle,ring,pinky] 0-1000
// send(positions) — send to hand

// ── updateHandViz ─────────────────────────────────────
function updateHandViz(vals){
  const thAux=(vals[1]||0)/1000;
  FDEFS[0].bx=THUMB_BX_OPEN+(THUMB_BX_CLOSED-THUMB_BX_OPEN)*thAux;

  FDEFS.forEach((fd,fi)=>{
    const frac=(vals[fd.si]||0)/1000;
    const f=forceLevel[fi];
    const rad=fd.angle*Math.PI/180,maxCurl=1.4;
    let cx=fd.bx,cy=fd.by,angle=rad;
    const fd_i=fingerData[fi];

    fd.segs.forEach((len,si)=>{
      const segCurl=(si===0?.4:si===1?.55:.45)*maxCurl*frac;
      angle+=(si===0?0:segCurl);
      const ex=cx+Math.cos(angle)*len,ey=cy+Math.sin(angle)*len;
      fd_i.bones[si].setAttribute("x1",cx.toFixed(1));fd_i.bones[si].setAttribute("y1",cy.toFixed(1));
      fd_i.bones[si].setAttribute("x2",ex.toFixed(1));fd_i.bones[si].setAttribute("y2",ey.toFixed(1));
      fd_i.bones[si].setAttribute("opacity",(0.35+frac*.5).toFixed(2));
      fd_i.knuckles[si].setAttribute("cx",cx.toFixed(1));
      fd_i.knuckles[si].setAttribute("cy",cy.toFixed(1));
      if(si===0)angle+=segCurl;
      cx=ex;cy=ey;
    });

    tipPos[fi]={x:cx,y:cy};
    fd_i.tipCirc.setAttribute("cx",cx.toFixed(1));fd_i.tipCirc.setAttribute("cy",cy.toFixed(1));
    fd_i.tipCirc.setAttribute("opacity",(0.25+frac*.45).toFixed(2));

    // Update gradient endpoints
    const gr=document.getElementById("fg"+fi);
    if(gr){gr.setAttribute("x2",cx.toFixed(1));gr.setAttribute("y2",cy.toFixed(1));}
  });
}

const DPR=window.devicePixelRatio||1;

// ── Tactile update ─────────────────────────────────────
function updateTactile(touch){
  FN.forEach((_,i)=>{
    const t=touch[i],nf=t.normal,tf=t.tangential,dir=t.direction,prox=t.proximity;
    history[i].push(nf);if(history[i].length>HLEN)history[i].shift();
    prevForce[i]=forceLevel[i];
    forceLevel[i]=Math.min(nf/FSCALE,1);

    const R=16,circ=2*Math.PI*R,frac=forceLevel[i];
    const arcEl=document.getElementById("arc"+i);
    arcEl.style.strokeDashoffset=circ*(1-frac);
    const ac=nf<500?FC[i]:nf<1500?"#ffd166":"#ff4060";
    arcEl.style.stroke=ac;
    document.getElementById("nfsv"+i).textContent=nf.toFixed(1);
    const nfv=document.getElementById("nfv"+i);
    nfv.textContent=nf.toFixed(1);nfv.style.color=ac;
    document.getElementById("tv"+i).textContent=tf.toFixed(1)+" N";
    document.getElementById("tarr"+i).setAttribute("transform","rotate("+dir+")");
    document.getElementById("pf"+i).style.width=Math.min(prox/200*100,100)+"%";
    document.getElementById("pv"+i).textContent=prox.toFixed(0);
    const dot=document.getElementById("sd"+i);
    dot.className="sdot"+(t.status===1?" w":t.status===2?" e":"");
    document.getElementById("fc"+i).classList.toggle("contact",nf>50);


  });
}

// ── Chart ──────────────────────────────────────────────
const cv=document.getElementById("chart"),ctx=cv.getContext("2d");
function drawChart(){
  const W=cv.offsetWidth,H=cv.offsetHeight;
  if(!W||!H)return;
  cv.width=W*DPR;cv.height=H*DPR;
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle="#1e2130";ctx.lineWidth=1;
  ctx.fillStyle="#3a3f55";ctx.font="9px Inter,sans-serif";ctx.textAlign="right";
  [.25,.5,.75,1].forEach(f=>{
    const y=H-f*(H-8)-4;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.fillText(Math.round(f*FSCALE)+" N",W-3,y-2);
  });
  FN.forEach((_,i)=>{
    const d=history[i];
    ctx.beginPath();ctx.strokeStyle=FC[i];ctx.lineWidth=1.8;
    d.forEach((v,j)=>{
      const x=j/(HLEN-1)*W,y=H-Math.min(v/FSCALE,1)*(H-8)-4;
      j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

const hbdot=document.getElementById("hbdot"),hbtext=document.getElementById("hbtext");
const hzlbl=document.getElementById("hzlbl");

function setBadge(state,text){
  const states={ok:"ok",err:"err","": ""};
  hbdot.className="hbadge-dot "+(states[state]||"");
  hbtext.className="hbadge-text "+(states[state]||"");
  hbtext.textContent=text;
}
function connect(){
  const proto=location.protocol==="https:"?"wss":"ws";
  ws=new WebSocket(proto+"://"+location.host+"/ws");
  ws.onopen=()=>{setBadge("ok","Connected");};
  ws.onclose=()=>{setBadge("err","Disconnected");setTimeout(connect,2000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.device_info&&!devinfo.textContent)devinfo.textContent=d.device_info;
    if(!d.connected)return;
    if(d.positions&&!dragState&&!mirrorActive){
      d.positions.forEach((p,i)=>{
        const sl=document.getElementById("sl"+i);
        if(sl&&document.activeElement!==sl){sl.value=p;sliderVals[i]=p;setTileVal(i,p);}
      });
    }
    if(d.touch)updateTactile(d.touch);
    updateHandViz(sliderVals);
    drawChart();
    hzF++;
    const now=performance.now();
    if(now-hzT>1000){hzlbl.textContent=hzF+" Hz";hzF=0;hzT=now;}
  };
}
function sendPositions(){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"set_positions",positions:[...sliderVals]}));
}
function sendPose(name){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"pose",name}));
  const p=POSES[name];if(!p)return;
  p.forEach((v,i)=>{
    sliderVals[i]=v;
    const sl=document.getElementById("sl"+i);
    if(sl)sl.value=v;
    setTileVal(i,v);
  });
  updateHandViz(sliderVals);
  // Particles burst on pose change
  FDEFS.forEach((_,fi)=>{ if(p[FDEFS[fi].si]>500)setTimeout(()=>emitParticles(fi,8),fi*80); });
}
async function runDemo(){
  if(demoRunning)return;
  demoRunning=true;
  const btn=document.getElementById("demobtn");
  btn.classList.add("running");
  const fill=document.getElementById("seqfill");
  const total=DEMO_SEQ.reduce((s,x)=>s+x.dur,0);
  let elapsed=0;
  for(const step of DEMO_SEQ){
    if(!demoRunning)break;
    sendPose(step.pose);
    btn.innerHTML='<span class="em">&#x25b6;</span>'+step.pose;
    const t0=performance.now();
    while(performance.now()-t0<step.dur){
      if(!demoRunning)break;
      elapsed+=16;fill.style.width=Math.min(elapsed/total*100,100)+"%";
      await new Promise(r=>setTimeout(r,16));
    }
  }
  demoRunning=false;btn.classList.remove("running");
  btn.innerHTML='<span class="em">&#x25b6;</span>Run Demo';fill.style.width="0%";
}
document.querySelectorAll(".pbtn:not(#demobtn)").forEach(b=>b.addEventListener("click",()=>{demoRunning=false;}));

function runCustomCode(){
  const out=document.getElementById("runOutput");
  const code=document.getElementById("codeEditor").value;
  out.textContent="";
  customRunning=false;
  const api={
    send:(p)=>{ sliderVals.splice(0,6,...p); p.forEach((v,i)=>{const sl=document.getElementById("sl"+i);if(sl)sl.value=v;setTileVal(i,v);}); sendPositions(); updateHandViz(sliderVals); },
    pose:(name)=>sendPose(name),
    sleep:(ms)=>new Promise(r=>setTimeout(r,ms)),
    log:(msg)=>{ out.textContent+=(out.textContent?"\n":"")+String(msg); out.scrollTop=out.scrollHeight; }

  const fn=new Function("send","pose","sleep","log",`"use strict";\n${code}`);
  Promise.resolve(fn(api.send,api.pose,api.sleep,api.log)).catch(e=>{ out.textContent+="\nERR: "+e.message; });
}

function _vecAngle(a, b) {
  const dot = a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  const na  = Math.hypot(...a), nb = Math.hypot(...b);
  if (na < 1e-6 || nb < 1e-6) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot/(na*nb)))) * 180 / Math.PI;
}
function _curl(lm, j) {
  const p = j.map(i => [lm[i].x, lm[i].y, lm[i].z]);
  const v0 = p[0].map((_,k) => p[1][k]-p[0][k]);
  const v1 = p[1].map((_,k) => p[2][k]-p[1][k]);
  const v2 = p[2].map((_,k) => p[3][k]-p[2][k]);
  return Math.min((_vecAngle(v0,v1) + _vecAngle(v1,v2)) / 160, 1);
}
function _thumbCurl(lm) {
  const p = [1,2,3,4].map(i => [lm[i].x,lm[i].y,lm[i].z]);
  const v0=p[0].map((_,k)=>p[1][k]-p[0][k]),v1=p[1].map((_,k)=>p[2][k]-p[1][k]),v2=p[2].map((_,k)=>p[3][k]-p[2][k]);
  return Math.min((_vecAngle(v0,v1)+_vecAngle(v1,v2))/140, 1);
}
function _thumbAux(lm) {
  const tip=[lm[4].x,lm[4].y,lm[4].z], idx=[lm[5].x,lm[5].y,lm[5].z];
  const w=[lm[0].x,lm[0].y,lm[0].z], mid=[lm[9].x,lm[9].y,lm[9].z];
  const sz = Math.hypot(...w.map((_,k)=>mid[k]-w[k])) + 1e-6;
  return Math.max(0, Math.min(1, 1-(Math.hypot(...tip.map((_,k)=>idx[k]-tip[k]))/sz - 0.2)/0.5));
}
function lmToPositions(lm) {
  return [
    Math.round(_thumbCurl(lm)*1000),
    Math.round(_thumbAux(lm)*1000),
    Math.round(_curl(lm,[5,6,7,8])*1000),
    Math.round(_curl(lm,[9,10,11,12])*1000),
    Math.round(_curl(lm,[13,14,15,16])*1000),
    Math.round(_curl(lm,[17,18,19,20])*1000),
  ];
}
function emaUpdate(raw) {
  const a = mirrorAlpha;
  if (!emaVals) { emaVals = [...raw]; return [...raw]; }
  emaVals = raw.map((v,i) => Math.round(a*v + (1-a)*emaVals[i]));
  return [...emaVals];
}
function applyMirrorPositions(pos) {
  pos.forEach((v,i) => {
    sliderVals[i] = v;
    const sl = document.getElementById("sl"+i);
    if (sl) sl.value = v;
    setTileVal(i, v);
  });
  sendPositions();
  updateHandViz(sliderVals);
}

// Draw skeleton on PIP canvas (coords are mirrored to match flipped video)
const MP_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];
const FINGER_TIP_IDX = new Set([4,8,12,16,20]);
function drawSkeleton(ctx, lm, w, h) {
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "rgba(108,142,255,0.75)";
  const pt = j => ({ x:(1-lm[j].x)*w, y:lm[j].y*h });
  MP_CONNECTIONS.forEach(([a,b]) => {
    const pa=pt(a), pb=pt(b);
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  });
  lm.forEach((_,j) => {
    const {x,y} = pt(j);
    const isTip = FINGER_TIP_IDX.has(j);
    ctx.beginPath();
    ctx.arc(x, y, isTip ? 4 : 2.5, 0, Math.PI*2);
    ctx.fillStyle = isTip ? "#a78bfa" : "rgba(255,255,255,0.85)";
    ctx.fill();
  });
}

async function initHandsModel() {
  if (handsModel) return;
  handsModel = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  handsModel.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6, minTrackingConfidence:0.5 });
  const pipCanvas = document.getElementById("pipCanvas");
  const pipCtx    = pipCanvas.getContext("2d");
  handsModel.onResults(results => {
    const w = pipCanvas.width, h = pipCanvas.height;
    pipCtx.clearRect(0, 0, w, h);
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0];
      drawSkeleton(pipCtx, lm, w, h);
      applyMirrorPositions(emaUpdate(lmToPositions(lm)));
    } else {
      applyMirrorPositions(emaUpdate([0,0,0,0,0,0]));
    }
  });
  // No explicit initialize() — MediaPipe initializes lazily on first send()
}

async function toggleMirror() {
  const btn   = document.getElementById("mirrorBtn");
  const pip   = document.getElementById("mirrorPip");
  const badge = document.getElementById("mirrorBadge");
  const video = document.getElementById("pipVideo");

  if (mirrorActive) {
    mirrorActive = false;
    if (mirrorStream) { mirrorStream.getTracks().forEach(t=>t.stop()); mirrorStream=null; }
    pip.classList.remove("active");
    badge.classList.remove("active");
    btn.classList.remove("active");
    btn.innerHTML = '<span class="dot"></span>Mirror';
    emaVals = null;
    return;
  }

    btn.innerHTML = 'Starting…';
  // Don't disable — allow cancel by clicking again
  try {
    mirrorStream = await navigator.mediaDevices.getUserMedia({
      video: { width:320, height:240, facingMode:"user" }, audio:false
    });
    video.srcObject = mirrorStream;
    await video.play();
    initHandsModel(); // sync — model loads lazily on first frame
    mirrorActive = true;
    pip.classList.add("active");
    badge.classList.add("active");
    btn.classList.add("active");
    btn.innerHTML = '<span class="dot"></span>Stop Mirror';
    btn.disabled = false;
    const pipCanvas = document.getElementById("pipCanvas");
    async function mirrorFrame() {
      if (!mirrorActive) return;
      if (video.readyState >= 2) {
        pipCanvas.width  = video.videoWidth  || 320;
        pipCanvas.height = video.videoHeight || 240;
        await handsModel.send({ image: video });
      }
      requestAnimationFrame(mirrorFrame);
    }
    requestAnimationFrame(mirrorFrame);
  } catch(e) {
    btn.innerHTML = '<span class="dot"></span>Mirror';
    btn.disabled = false;
    badge.textContent = "Camera denied";
    badge.style.color = "var(--red)";
    badge.style.borderColor = "var(--red)";
    badge.classList.add("active");
    setTimeout(() => {
      badge.classList.remove("active");
      badge.textContent = "\u25c9 Mirror Active";
      badge.style.color = "";
      badge.style.borderColor = "";
    }, 3000);
  }
}

// Disable finger manual interaction while mirror active (allow it to pass through)
const _origMousedown = window.onmousedown;
document.getElementById("hand-svg").addEventListener("mousedown", e => {
  if (mirrorActive) { e.stopImmediatePropagation(); }
}, true);

connect();
updateHandViz(sliderVals);
window.addEventListener("resize",drawChart);

// ── Row resize handle (poses ↕ chart) ────────────────
(function(){
  const posesEl=document.querySelector(".poses-section");
  const rh1=document.getElementById("rh1");
  let drag=null;
  rh1.addEventListener("mousedown",e=>{
    e.preventDefault();
    rh1.classList.add("dragging");
    drag={startY:e.clientY,startH:posesEl.offsetHeight};
  });
  window.addEventListener("mousemove",e=>{
    if(!drag)return;
    const delta=e.clientY-drag.startY;
    const rcol=document.getElementById("rcol");
    const newH=Math.max(100,Math.min(rcol.offsetHeight-80,drag.startH+delta));
    posesEl.style.flex="0 0 "+newH+"px";
    drawChart();
  });
  window.addEventListener("mouseup",()=>{
    if(drag){rh1.classList.remove("dragging");drag=null;}
  });
})();

// ── Column resize handles ─────────────────────────────
(function(){
  const lcol=document.getElementById("lcol");
  const rcol=document.getElementById("rcol");
  const ch1=document.getElementById("ch1");
  const ch2=document.getElementById("ch2");
  let drag=null;
  function startDrag(e,side){
    e.preventDefault();
    const startX=e.clientX,startW=side==="left"?lcol.offsetWidth:document.getElementById("ccol").offsetWidth;
    const handle=side==="left"?ch1:ch2;
    handle.classList.add("dragging");
    drag={side,startX,startW,handle};
  }
  ch1.addEventListener("mousedown",e=>startDrag(e,"left"));
  ch2.addEventListener("mousedown",e=>startDrag(e,"right"));
  window.addEventListener("mousemove",e=>{
    if(!drag)return;
    const delta=e.clientX-drag.startX;
    if(drag.side==="left"){
      lcol.style.width=Math.max(160,Math.min(520,drag.startW+delta))+"px";
    } else {
      // ch2 resizes center column
      const ccol=document.getElementById("ccol");
      ccol.style.width=Math.max(160,Math.min(600,drag.startW+delta))+"px";
    }
    drawChart();
  });
  window.addEventListener("mouseup",()=>{
    if(drag){drag.handle.classList.remove("dragging");drag=null;}
  });
})();
</script>
