<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainCo Revo2 · Tactile Dashboard</title>
<style>
:root{
  --bg:#08090d;--surface:#0f1117;--surface2:#161821;--border:#1e2130;
  --accent:#6c8eff;--text:#dde0ef;--muted:#4a4f62;
  --green:#3dffa0;--yellow:#ffd166;--red:#ff4060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
     font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{display:flex;align-items:center;gap:0;padding:0 20px;height:44px;
  background:rgba(8,9,13,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;position:relative;z-index:50}
.hlogo{display:flex;align-items:center;gap:9px;margin-right:20px}
.hlogo h1{font-size:13px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
.hsep{width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 16px;flex-shrink:0}
.hbadge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:500}
.hbadge-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .4s}
.hbadge-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
.hbadge-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.hbadge-text{transition:color .4s}
.hbadge-text.ok{color:var(--green)}
.hbadge-text.err{color:var(--red)}
.hdevinfo{font-size:11px;color:var(--muted);font-weight:400;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.hhz{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:500}
/* mirror button — pill style */
#mirrorBtn{display:flex;align-items:center;gap:6px;padding:0 14px;height:28px;
  border-radius:14px;background:var(--surface2);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .2s;letter-spacing:.01em;font-family:inherit}
#mirrorBtn:hover{border-color:rgba(108,142,255,.5);color:var(--text);background:rgba(108,142,255,.08)}
#mirrorBtn.active{background:rgba(108,142,255,.12);border-color:rgba(108,142,255,.6);color:var(--accent)}
#mirrorBtn .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .3s;flex-shrink:0}
#mirrorBtn.active .dot{background:var(--red);box-shadow:0 0 7px var(--red);animation:breathe .9s ease-in-out infinite}
.badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;
  background:#1a1c28;color:var(--muted);transition:all .4s}
.badge.ok{background:#0b2218;color:var(--green)}
.badge.err{background:#280d14;color:var(--red)}
.ptitle{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;flex-shrink:0}

/* 3-column layout: sidebar | HAND | sidebar (flex, resizable) */
.workspace{flex:1;display:flex;overflow:hidden;min-height:0;background:var(--border)}
.panel{background:var(--bg);padding:10px 14px;display:flex;flex-direction:column;
  overflow:hidden;min-width:0;min-height:0}
/* drag handles between columns */
.col-handle{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;
  transition:background .15s;user-select:none;-webkit-user-select:none}
.col-handle:hover,.col-handle.dragging{background:var(--accent)}

/* LEFT: sensor + finger tiles */
.left-col{display:flex;flex-direction:column;gap:8px;background:var(--bg);padding:8px 0;overflow:hidden;min-height:0;flex-shrink:0}
.sensor-panel{background:var(--bg);flex:1;padding:0 14px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.fingers-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:7px;flex:1;min-height:0}
.fc{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--c);
  border-radius:10px;padding:12px 13px;display:flex;flex-direction:column;gap:5px;
  position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.fc.contact{box-shadow:0 0 18px color-mix(in srgb,var(--c) 35%,transparent);border-color:var(--c)}
.fc .glow{position:absolute;inset:0;border-radius:9px;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,var(--c) 0%,transparent 60%);opacity:0;transition:opacity .2s}
.fc.contact .glow{opacity:.1}
.flabel{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c,var(--muted));display:flex;align-items:center;justify-content:space-between}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);
  box-shadow:0 0 4px var(--green);transition:all .3s;flex-shrink:0}
.sdot.w{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.sdot.e{background:var(--red);box-shadow:0 0 4px var(--red)}
.arc-svg{width:54px;height:54px;flex-shrink:0}
.arc-track{fill:none;stroke:var(--surface2);stroke-width:3.5}
.arc-fill{fill:none;stroke-width:3.5;stroke-linecap:round;stroke:var(--c,var(--accent));
  transition:stroke-dashoffset .12s,stroke .15s}
.nfsv-text{font-weight:900;font-family:'Inter',sans-serif}
.nfv{font-size:18px;font-weight:900;line-height:1;transition:color .15s;font-variant-numeric:tabular-nums}
.tval{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.fc-row{display:flex;align-items:center;gap:6px}
.prox-wrap{width:100%}
.prox-track{width:100%;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prox-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--c,var(--accent)),transparent);transition:width .1s}
.prox-lbl{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);margin-top:2px}

.finger-panel{background:var(--bg);flex:1;min-height:0;padding:0 14px;display:flex;flex-direction:column;overflow:hidden}
.finger-tiles{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:7px;flex:1;min-height:0}
.ftile{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--c);
  border-radius:10px;padding:12px 13px;display:flex;flex-direction:column;gap:4px;
  transition:box-shadow .2s,transform .12s;overflow:hidden;cursor:pointer}
.ftile:hover{box-shadow:0 0 18px color-mix(in srgb,var(--c) 25%,transparent);transform:translateY(-1px)}
.ftile:active{transform:scale(.98)}
.ftile-top{display:flex;justify-content:space-between;align-items:center}
.ftile-name{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--c)}
.ftile-dot{width:6px;height:6px;border-radius:50%;background:var(--surface2);
  transition:background .25s,box-shadow .25s}
.ftile-dot.active{background:var(--c);box-shadow:0 0 7px var(--c)}
.ftile-val{font-size:36px;font-weight:900;line-height:1;color:var(--text);
  font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.ftile-row{display:flex;justify-content:space-between;align-items:center}
.ftile-pct{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.ftile-max{font-size:9px;color:var(--muted)}
.ftile-track{width:100%;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin:2px 0}
.ftile-fill{height:100%;border-radius:2px;background:var(--c);transition:width .07s;opacity:.85}
input.ftile-slider{width:100%;cursor:pointer;-webkit-appearance:none;appearance:none;
  height:6px;border-radius:4px;background:var(--surface2);outline:none;border:none;margin-top:auto}
input.ftile-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--c);cursor:pointer;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 25%,transparent)}
input.ftile-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
  border:none;background:var(--c);cursor:pointer}

/* CENTER: big hand */
.center-col{position:relative;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg);flex:1;min-width:160px}
.hand-header{padding:8px 14px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hand-hint{font-size:9px;color:var(--muted);margin-left:auto;letter-spacing:.02em}
.hand-area{flex:1;position:relative;min-height:0;overflow:hidden}
#hand-svg{position:absolute;inset:0;width:100%;height:100%}
#particles{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
#hand-tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;color:var(--text);
  pointer-events:none;display:none;z-index:100;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.6)}

/* RIGHT: poses + chart */
.right-col{display:flex;flex-direction:column;gap:8px;background:var(--bg);padding:8px 0;overflow:hidden;min-height:0;flex-shrink:0}
.poses-section{background:var(--bg);flex:1;min-height:120px;padding:0;display:flex;flex-direction:row;overflow:hidden;gap:8px}
.row-handle{height:5px;background:var(--border);cursor:row-resize;flex-shrink:0;transition:background .15s;user-select:none;-webkit-user-select:none}
.row-handle:hover,.row-handle.dragging{background:var(--accent)}
.poses-left{padding:0 14px;display:flex;flex-direction:column;overflow-y:auto;flex:1;min-width:0;scrollbar-width:thin}
.poses-right{padding:0 14px;display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:0;background:var(--bg)}
.pose-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex:1}
.pbtn{padding:8px 4px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);color:var(--text);font-size:10px;font-weight:700;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.pbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.pbtn:active{transform:scale(.96)}
.pbtn.wide{grid-column:span 2}
.pbtn .em{font-size:14px}
.pbtn.running{border-color:var(--green);color:var(--green);
  background:color-mix(in srgb,var(--green) 8%,var(--surface))}
.seq-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;flex-shrink:0}
.seq-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.key-hints{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;flex-shrink:0}
.kh{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:1px 5px;font-size:9px;color:var(--muted);font-family:monospace}
/* code editor */
.code-editor{width:100%;flex:1;min-height:0;resize:none;background:var(--surface);
  border:1px solid var(--border);border-radius:6px;color:var(--text);
  font-family:'Fira Code','Courier New',monospace;font-size:11px;padding:8px;
  outline:none;line-height:1.5;scrollbar-width:thin}
.code-editor:focus{border-color:var(--accent)}
.run-btn{margin-top:6px;padding:6px 0;border-radius:7px;background:var(--accent);
  border:none;color:#fff;font-size:11px;font-weight:800;cursor:pointer;
  flex-shrink:0;transition:background .15s,transform .1s}
.run-btn:hover{background:#5a7eff}
.run-btn:active{transform:scale(.97)}
.run-output{margin-top:5px;font-size:10px;color:var(--muted);font-family:monospace;
  max-height:48px;overflow-y:auto;flex-shrink:0;line-height:1.4;word-break:break-all}

.chart-section{background:var(--bg);flex:1;min-height:80px;padding:0 14px;display:flex;flex-direction:column;overflow:hidden}
.chart-wrap{flex:1;position:relative;min-height:0}
canvas#chart{position:absolute;inset:0;width:100%;height:100%;border-radius:7px;
  background:var(--surface);border:1px solid var(--border)}
.cleg{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;flex-shrink:0}
.cli{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.cld{width:7px;height:7px;border-radius:50%}

/* SVG hand elements */
.palm-label{fill:var(--muted);font-size:7px;text-anchor:middle;
  font-family:'Inter',sans-serif;pointer-events:none}
.finger-group{cursor:ns-resize;transition:filter .15s}
.finger-group:hover{filter:brightness(1.6) drop-shadow(0 0 6px currentColor)}

@keyframes contactPulse{0%{transform:scale(1);opacity:.9}100%{transform:scale(2.5);opacity:0}}
@keyframes scanRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{opacity:.7}50%{opacity:1}}
.idle-breathe{animation:breathe 3s ease-in-out infinite}

/* Mirror Mode */
.mirror-pip{position:absolute;bottom:12px;right:12px;width:200px;height:150px;
  border-radius:10px;overflow:hidden;border:2px solid var(--accent);z-index:20;
  display:none;box-shadow:0 4px 24px rgba(108,142,255,.35)}
.mirror-pip.active{display:block}
#pipVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#pipCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mirror-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:color-mix(in srgb,var(--accent) 18%,var(--bg));border:1px solid var(--accent);
  border-radius:20px;padding:3px 14px;font-size:9px;font-weight:800;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;display:none;z-index:20;pointer-events:none}
.mirror-badge.active{display:block}
.mirror-smoothing{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);
  flex-shrink:0;margin-left:auto}
.mirror-smoothing label{cursor:pointer;color:var(--muted)}
.mirror-smoothing input{width:60px;cursor:pointer;accent-color:var(--accent)}
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <rect x="7" y="1" width="3" height="11" rx="1.5" fill="#6c8eff" opacity=".9"/>
      <rect x="11" y="0" width="3" height="12" rx="1.5" fill="#a78bfa" opacity=".9"/>
      <rect x="3" y="3" width="3" height="9" rx="1.5" fill="#60a5fa" opacity=".9"/>
      <rect x="15" y="4" width="3" height="8" rx="1.5" fill="#fbbf24" opacity=".9"/>
      <rect x="3" y="13" width="15" height="5" rx="2" fill="#1e2130"/>
    </svg>
    <h1>Revo2Touch</h1>
  </div>
  <div class="hsep"></div>
  <div class="hbadge">
    <div class="hbadge-dot" id="hbdot"></div>
    <span class="hbadge-text" id="hbtext">Connecting&hellip;</span>
  </div>
  <div class="hsep"></div>
  <div class="hdevinfo" id="devinfo"></div>
  <div class="hright">
    <span class="hhz" id="hzlbl">&mdash; Hz</span>
    <div class="hsep"></div>
    <button id="mirrorBtn" onclick="toggleMirror()"><span class="dot"></span>Mirror</button>
  </div>
</header>

<div class="workspace" id="workspace">

  <!-- LEFT: sensor + finger tiles -->
  <div class="left-col" id="lcol" style="width:255px">
    <div class="sensor-panel">
      <div class="ptitle" style="padding:10px 0 0">Tactile Sensors</div>
      <div class="fingers-grid" id="fgrid"></div>
    </div>
    <div class="finger-panel">
      <div class="ptitle" style="padding:10px 0 0">Finger Control</div>
      <div class="finger-tiles" id="ftiles"></div>
    </div>
  </div>

  <div class="col-handle" id="ch1"></div>

  <!-- CENTER: hero hand -->
  <div class="center-col" id="ccol" style="width:280px;flex:none">
    <div class="hand-header">
      <div class="ptitle" style="margin-bottom:0">Hand Control</div>
      <span class="hand-hint">drag &#183; click to toggle &#183; scroll to adjust</span>
    </div>
    <div class="hand-area">
      <svg id="hand-svg" viewBox="-18 0 218 320" xmlns="http://www.w3.org/2000/svg"></svg>
      <canvas id="particles"></canvas>
      <div class="mirror-pip" id="mirrorPip">
        <video id="pipVideo" autoplay muted playsinline></video>
        <canvas id="pipCanvas"></canvas>
      </div>
      <div class="mirror-badge" id="mirrorBadge">◉ Mirror Active</div>
    </div>
  </div>

  <div class="col-handle" id="ch2"></div>

  <!-- RIGHT: poses + chart -->
  <div class="right-col" id="rcol" style="flex:1;min-width:200px">
    <div class="poses-section">
      <div class="poses-left">
        <div class="ptitle" style="padding:10px 0 0">Poses</div>
        <div class="pose-grid">
          <button class="pbtn" onclick="sendPose('open')"><span class="em">&#x1f590;&#xfe0f;</span>Open</button>
          <button class="pbtn" onclick="sendPose('fist')"><span class="em">&#x270a;</span>Fist</button>
          <button class="pbtn" onclick="sendPose('point')"><span class="em">&#x261d;&#xfe0f;</span>Point</button>
          <button class="pbtn" onclick="sendPose('peace')"><span class="em">&#x270c;&#xfe0f;</span>Peace</button>
          <button class="pbtn" onclick="sendPose('pinch')"><span class="em">&#x1f90f;</span>Pinch</button>
          <button class="pbtn" onclick="sendPose('ok')"><span class="em">&#x1f44c;</span>OK</button>
          <button class="pbtn" onclick="sendPose('gun')"><span class="em">&#x1f52b;</span>Gun</button>
          <button class="pbtn" onclick="sendPose('claw')"><span class="em">&#x1f9be;</span>Claw</button>
          <button class="pbtn" onclick="sendPose('relax')"><span class="em">&#x1f4a4;</span>Relax</button>
          <button class="pbtn" onclick="sendPose('rock')"><span class="em">&#x1f918;</span>Rock</button>
          <button class="pbtn" onclick="sendPose('three')"><span class="em">3&#xfe0f;&#x20e3;</span>Three</button>
          <button class="pbtn wide" id="demobtn" onclick="runDemo()"><span class="em">&#x25b6;</span>Run Demo</button>
        </div>
        <div class="seq-bar"><div class="seq-fill" id="seqfill" style="width:0%"></div></div>
        <div class="key-hints">
          <span class="kh">O</span><span style="font-size:9px;color:var(--muted)">Open</span>
          <span class="kh">F</span><span style="font-size:9px;color:var(--muted)">Fist</span>
          <span class="kh">P</span><span style="font-size:9px;color:var(--muted)">Point</span>
          <span class="kh">V</span><span style="font-size:9px;color:var(--muted)">Peace</span>
          <span class="kh">N</span><span style="font-size:9px;color:var(--muted)">Pinch</span>
          <span class="kh">K</span><span style="font-size:9px;color:var(--muted)">OK</span>
        </div>
      </div>
      <div class="poses-right" style="border-left:1px solid var(--border)">
        <div class="ptitle" style="padding:10px 0 0">Custom Code</div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false">// positions: [thumb,thaux,index,middle,ring,pinky] 0-1000
// send(positions) — send to hand
// pose(name) — run a named pose
// sleep(ms) — async wait
// log(msg) — print below

async function run() {
  // wave fingers
  for (let i = 2; i <= 5; i++) {
    let p = [800,800,0,0,0,0];
    p[i] = 1000;
    send(p);
    await sleep(300);
  }
  await sleep(200);
  send([0,0,0,0,0,0]);
  log('done!');
}

run();</textarea>
        <button class="run-btn" onclick="runCustomCode()">&#x25b6; Run</button>
        <div class="run-output" id="runOutput"></div>
      </div>
    </div>
    <div class="row-handle" id="rh1"></div>
    <div class="chart-section">
      <div class="ptitle" style="padding:10px 0 0">Force History (2500 N scale)</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div class="cleg" id="cleg"></div>
    </div>
  </div>

</div>
<div id="hand-tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
const FN   = ["Thumb","Index","Middle","Ring","Pinky"];
const FC   = ["#a78bfa","#60a5fa","#34d399","#fbbf24","#f87171"];
const FC_B = ["#ede9fe","#dbeafe","#d1fae5","#fef3c7","#fee2e2"]; // bright versions
const SN   = ["Thumb","ThAux","Index","Middle","Ring","Pinky"];
const SC   = ["#a78bfa","#c4b5fd","#60a5fa","#34d399","#fbbf24","#f87171"];
const HLEN = 200, FSCALE = 2500;
const POSES = {
  open:   [0,   0,   0,    0,    0,    0],
  fist:   [800, 800, 1000, 1000, 1000, 1000],
  point:  [800, 800, 0,    1000, 1000, 1000],
  peace:  [800, 800, 0,    0,    1000, 1000],
  pinch:  [500, 0,   500,  0,    0,    0],
  ok:     [700, 600, 700,  0,    0,    0],
  gun:    [0,   0,   0,    1000, 1000, 1000],
  claw:   [0,   0,   500,  500,  500,  500],
  spread: [0,   0,   0,    0,    0,    0],
  relax:  [300, 200, 300,  300,  300,  300],
  three:  [800, 800, 0,    0,    0,    1000],
  rock:   [0,   0,   1000, 1000, 0,    0],
};

  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));

}
function mkLine(x1,y1,x2,y2,extra={}){

}

// ── updateHandViz ─────────────────────────────────────
function updateHandViz(vals){
  const thAux=(vals[1]||0)/1000;
  FDEFS[0].bx=THUMB_BX_OPEN+(THUMB_BX_CLOSED-THUMB_BX_OPEN)*thAux;

  FDEFS.forEach((fd,fi)=>{
    const frac=(vals[fd.si]||0)/1000;
    const f=forceLevel[fi];
    const rad=fd.angle*Math.PI/180,maxCurl=1.4;
    let cx=fd.bx,cy=fd.by,angle=rad;
    const fd_i=fingerData[fi];

    fd.segs.forEach((len,si)=>{
      const segCurl=(si===0?.4:si===1?.55:.45)*maxCurl*frac;
      angle+=(si===0?0:segCurl);
      const ex=cx+Math.cos(angle)*len,ey=cy+Math.sin(angle)*len;
      const setLn=(el)=>{
        el.setAttribute("x1",cx.toFixed(1));el.setAttribute("y1",cy.toFixed(1));
        el.setAttribute("x2",ex.toFixed(1));el.setAttribute("y2",ey.toFixed(1));
      };
      setLn(fd_i.shadows[si]);setLn(fd_i.glowBones[si]);setLn(fd_i.bones[si]);
      fd_i.bones[si].setAttribute("opacity",(0.3+frac*.55).toFixed(2));
      fd_i.glowBones[si].setAttribute("opacity",(f*.7).toFixed(2));
      fd_i.knuckles[si].setAttribute("cx",cx.toFixed(1));
      fd_i.knuckles[si].setAttribute("cy",cy.toFixed(1));
      fd_i.knuckles[si].setAttribute("opacity",(0.45+frac*.45).toFixed(2));
      if(si===0)angle+=segCurl;
      cx=ex;cy=ey;
    });

    tipPos[fi]={x:cx,y:cy};
    const setPos=(el)=>{el.setAttribute("cx",cx.toFixed(1));el.setAttribute("cy",cy.toFixed(1));};
    setPos(fd_i.tipGlow);setPos(fd_i.tipCirc);setPos(fd_i.tipRing);

    // Force-reactive tip
    const tipR=7+f*8;
    const tipCol=f>0.6?"#ff4060":f>0.3?"#ffd166":fd.color;
    fd_i.tipCirc.setAttribute("r",tipR.toFixed(1));
    fd_i.tipCirc.setAttribute("fill",tipCol);
    fd_i.tipCirc.setAttribute("opacity",(0.2+frac*.5+f*.3).toFixed(2));
    fd_i.tipRing.setAttribute("cx",cx.toFixed(1));fd_i.tipRing.setAttribute("cy",cy.toFixed(1));
    fd_i.tipRing.setAttribute("r",(tipR+5).toFixed(1));
    fd_i.tipRing.setAttribute("stroke",tipCol);
    fd_i.tipRing.setAttribute("opacity",(0.15+f*.5).toFixed(2));
    fd_i.tipGlow.setAttribute("opacity",(f*.65).toFixed(2));

    // Update gradient endpoints to match current tip
    const setGrad=(id)=>{
      const gr=document.getElementById(id);
      if(!gr)return;
      gr.setAttribute("x1",fd.bx.toFixed(1));gr.setAttribute("y1",fd.by.toFixed(1));
      gr.setAttribute("x2",cx.toFixed(1));gr.setAttribute("y2",cy.toFixed(1));
    };
    setGrad("fg"+fi);setGrad("fgg"+fi);
  });

  // Palm glow = average force
  const avgF=forceLevel.reduce((s,v)=>s+v,0)/5;
  palmGlow.setAttribute("opacity",(avgF*.4).toFixed(2));
}

// ── Particle + Ripple + Energy system ─────────────────
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
const particles=[];
const ripples=[];
const DPR=window.devicePixelRatio||1;

// Energy dot phases
const energyPhase=FDEFS.map((_,i)=>i*0.22);
const energySpeed=0.015;

function svgToCanvas(sx,sy){
  const sr=handSvg.getBoundingClientRect();
  const pr=pCanvas.getBoundingClientRect();
  const scX=sr.width/200,scY=sr.height/320;
  return{x:(sr.left-pr.left)+sx*scX,y:(sr.top-pr.top)+sy*scY};
}

function emitParticles(fi,count){
  const tp=tipPos[fi];
  const {x,y}=svgToCanvas(tp.x,tp.y);
  const col=FC[fi];
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=0.4+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.8,col,
      alpha:1,size:1+Math.random()*2.5,life:1,decay:0.022+Math.random()*0.02});
  }
}

function emitRipple(fi){
  const tp=tipPos[fi];
  const el=mkEl("circle",{cx:tp.x.toFixed(1),cy:tp.y.toFixed(1),
    r:"9",fill:"none",stroke:FC[fi],"stroke-width":"2",opacity:"0.9"});
  fxGrp.appendChild(el);
  ripples.push({el,r:9,alpha:0.9,fi});
}

function flashFinger(fi){
  const g=document.getElementById("fg"+fi);
  if(!g)return;
  g.style.filter="brightness(3.5)";
  setTimeout(()=>g.style.filter="brightness(1.5)",120);
  setTimeout(()=>g.style.filter="brightness(2.5)",200);
  setTimeout(()=>g.style.filter="",380);
}

function getFingerPosAt(fi,phase){
  const fd=FDEFS[fi];
  const frac=(sliderVals[fd.si]||0)/1000;
  const rad=fd.angle*Math.PI/180,maxCurl=1.4;
  const total=fd.segs.reduce((s,l)=>s+l,0);
  let dist=phase*total,cx=fd.bx,cy=fd.by,angle=rad;
  for(let si=0;si<fd.segs.length;si++){
    const len=fd.segs[si];
    const sc=(si===0?.4:si===1?.55:.45)*maxCurl*frac;
    if(si>0)angle+=sc;
    const step=Math.min(dist,len);
    cx+=Math.cos(angle)*step;cy+=Math.sin(angle)*step;
    if(si===0)angle+=sc;
    dist-=step;
    if(dist<=0)break;
  }
  return{x:cx,y:cy};
}

let scanAngle=0; // kept to avoid reference errors (scan removed)
function animLoop(){
  // Resize canvas
  const pr=pCanvas.parentElement.getBoundingClientRect();
  const w=pr.width,h=pr.height;
  if(Math.round(pCanvas.width)!==Math.round(w*DPR)){
    pCanvas.width=Math.round(w*DPR);pCanvas.height=Math.round(h*DPR);
  }
  pCtx.setTransform(DPR,0,0,DPR,0,0);
  pCtx.clearRect(0,0,w,h);

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    pCtx.globalAlpha=p.life*.85;
    pCtx.fillStyle=p.col;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*Math.max(p.life,.1),0,Math.PI*2);
    pCtx.fill();
  }
  pCtx.globalAlpha=1;

  // Ripples (SVG)
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i];
    r.r+=2.2;r.alpha-=0.028;
    if(r.alpha<=0){r.el.remove();ripples.splice(i,1);continue;}
    const tp=tipPos[r.fi];
    r.el.setAttribute("cx",tp.x.toFixed(1));
    r.el.setAttribute("cy",tp.y.toFixed(1));
    r.el.setAttribute("r",r.r.toFixed(1));
    r.el.setAttribute("opacity",r.alpha.toFixed(2));
  }

  // Energy dots
  FDEFS.forEach((fd,fi)=>{
    const frac=(sliderVals[fd.si]||0)/1000;
    const f=forceLevel[fi];
    const active=frac>0.05||f>0.05;
    const edot=fingerData[fi].edot;
    if(active){
      energyPhase[fi]=(energyPhase[fi]+energySpeed*(0.5+frac*2.5))%1;
      const pos=getFingerPosAt(fi,energyPhase[fi]);
      edot.setAttribute("cx",pos.x.toFixed(1));
      edot.setAttribute("cy",pos.y.toFixed(1));
      edot.setAttribute("r",(2+frac*1.5).toFixed(1));
      const ec=f>0.6?"#ff4060":f>0.25?"#ffd166":"#ffffff";
      edot.setAttribute("fill",ec);
      edot.setAttribute("opacity",(0.4+frac*.5+f*.3).toFixed(2));
    } else {
      edot.setAttribute("opacity","0");
    }
  });

  // (scan removed)

  requestAnimationFrame(animLoop);
}
animLoop();

// ── Tactile update ─────────────────────────────────────
function updateTactile(touch){
  FN.forEach((_,i)=>{
    const t=touch[i],nf=t.normal,tf=t.tangential,dir=t.direction,prox=t.proximity;
    history[i].push(nf);if(history[i].length>HLEN)history[i].shift();
    prevForce[i]=forceLevel[i];
    forceLevel[i]=Math.min(nf/FSCALE,1);

    const R=16,circ=2*Math.PI*R,frac=forceLevel[i];
    const arcEl=document.getElementById("arc"+i);
    arcEl.style.strokeDashoffset=circ*(1-frac);
    const ac=nf<500?FC[i]:nf<1500?"#ffd166":"#ff4060";
    arcEl.style.stroke=ac;
    document.getElementById("nfsv"+i).textContent=nf.toFixed(1);
    const nfv=document.getElementById("nfv"+i);
    nfv.textContent=nf.toFixed(1);nfv.style.color=ac;
    document.getElementById("tv"+i).textContent=tf.toFixed(1)+" N";
    document.getElementById("tarr"+i).setAttribute("transform","rotate("+dir+")");
    document.getElementById("pf"+i).style.width=Math.min(prox/200*100,100)+"%";
    document.getElementById("pv"+i).textContent=prox.toFixed(0);
    const dot=document.getElementById("sd"+i);
    dot.className="sdot"+(t.status===1?" w":t.status===2?" e":"");
    document.getElementById("fc"+i).classList.toggle("contact",nf>50);

    // Contact events
    if(forceLevel[i]>0.02&&prevForce[i]<=0.02){
      emitRipple(i);emitParticles(i,6);
    }
    if(forceLevel[i]>0.4&&prevForce[i]<=0.4){
      emitRipple(i);emitParticles(i,16);flashFinger(i);
    }
  });
}

// ── Chart ──────────────────────────────────────────────
const cv=document.getElementById("chart"),ctx=cv.getContext("2d");
function drawChart(){
  const W=cv.offsetWidth,H=cv.offsetHeight;
  if(!W||!H)return;
  cv.width=W*DPR;cv.height=H*DPR;
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle="#1e2130";ctx.lineWidth=1;
  ctx.fillStyle="#3a3f55";ctx.font="9px Inter,sans-serif";ctx.textAlign="right";
  [.25,.5,.75,1].forEach(f=>{
    const y=H-f*(H-8)-4;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.fillText(Math.round(f*FSCALE)+" N",W-3,y-2);
  });
  FN.forEach((_,i)=>{
    const d=history[i];
    ctx.beginPath();ctx.strokeStyle=FC[i];ctx.lineWidth=1.8;
    d.forEach((v,j)=>{
      const x=j/(HLEN-1)*W,y=H-Math.min(v/FSCALE,1)*(H-8)-4;
      j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

// ── WebSocket ──────────────────────────────────────────
const hbdot=document.getElementById("hbdot"),hbtext=document.getElementById("hbtext");
const hzlbl=document.getElementById("hzlbl");
const devinfo=document.getElementById("devinfo");
function setBadge(state,text){
  const states={ok:"ok",err:"err","": ""};
  hbdot.className="hbadge-dot "+(states[state]||"");
  hbtext.className="hbadge-text "+(states[state]||"");
  hbtext.textContent=text;
}
function connect(){
  const proto=location.protocol==="https:"?"wss":"ws";
  ws=new WebSocket(proto+"://"+location.host+"/ws");
  ws.onopen=()=>{setBadge("ok","Connected");};
  ws.onclose=()=>{setBadge("err","Disconnected");setTimeout(connect,2000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.device_info&&!devinfo.textContent)devinfo.textContent=d.device_info;
    if(!d.connected)return;
    if(d.positions&&!dragState&&!mirrorActive){
      d.positions.forEach((p,i)=>{
        const sl=document.getElementById("sl"+i);
        if(sl&&document.activeElement!==sl){sl.value=p;sliderVals[i]=p;setTileVal(i,p);}
      });
    }
    if(d.touch)updateTactile(d.touch);
    updateHandViz(sliderVals);
    drawChart();
    hzF++;
    const now=performance.now();
    if(now-hzT>1000){hzlbl.textContent=hzF+" Hz";hzF=0;hzT=now;}
  };
}
function sendPositions(){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"set_positions",positions:[...sliderVals]}));
}
function sendPose(name){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"pose",name}));
  const p=POSES[name];if(!p)return;
  p.forEach((v,i)=>{
    sliderVals[i]=v;
    const sl=document.getElementById("sl"+i);
    if(sl)sl.value=v;
    setTileVal(i,v);
  });
  updateHandViz(sliderVals);
  // Particles burst on pose change
  FDEFS.forEach((_,fi)=>{ if(p[FDEFS[fi].si]>500)setTimeout(()=>emitParticles(fi,8),fi*80); });
}
async function runDemo(){
  if(demoRunning)return;
  demoRunning=true;
  const btn=document.getElementById("demobtn");
  btn.classList.add("running");
  const fill=document.getElementById("seqfill");
  const total=DEMO_SEQ.reduce((s,x)=>s+x.dur,0);
  let elapsed=0;
  for(const step of DEMO_SEQ){
    if(!demoRunning)break;
    sendPose(step.pose);
    btn.innerHTML='<span class="em">&#x25b6;</span>'+step.pose;
    const t0=performance.now();
    while(performance.now()-t0<step.dur){
      if(!demoRunning)break;
      elapsed+=16;fill.style.width=Math.min(elapsed/total*100,100)+"%";
      await new Promise(r=>setTimeout(r,16));
    }
  }
  demoRunning=false;btn.classList.remove("running");
  btn.innerHTML='<span class="em">&#x25b6;</span>Run Demo';fill.style.width="0%";
}
document.querySelectorAll(".pbtn:not(#demobtn)").forEach(b=>b.addEventListener("click",()=>{demoRunning=false;}));

// ── Custom code runner ────────────────────────────────
let customRunning=false;
function runCustomCode(){
  const out=document.getElementById("runOutput");
  const code=document.getElementById("codeEditor").value;
  out.textContent="";
  customRunning=false;
  const api={
    send:(p)=>{ sliderVals.splice(0,6,...p); p.forEach((v,i)=>{const sl=document.getElementById("sl"+i);if(sl)sl.value=v;setTileVal(i,v);}); sendPositions(); updateHandViz(sliderVals); },
    pose:(name)=>sendPose(name),
    sleep:(ms)=>new Promise(r=>setTimeout(r,ms)),
    log:(msg)=>{ out.textContent+=(out.textContent?"\n":"")+String(msg); out.scrollTop=out.scrollHeight; }
  };
  const fn=new Function("send","pose","sleep","log",`"use strict";\n${code}`);
  Promise.resolve(fn(api.send,api.pose,api.sleep,api.log)).catch(e=>{ out.textContent+="\nERR: "+e.message; });
}
// ── Mirror Mode (MediaPipe Hands in-browser) ──────────
let mirrorActive = false;
let handsModel   = null;
let mirrorStream = null;
let emaVals      = null;
let mirrorAlpha  = 0.2;

function _vecAngle(a, b) {
  const dot = a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  const na  = Math.hypot(...a), nb = Math.hypot(...b);
  if (na < 1e-6 || nb < 1e-6) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot/(na*nb)))) * 180 / Math.PI;
}
function _curl(lm, j) {
  const p = j.map(i => [lm[i].x, lm[i].y, lm[i].z]);
  const v0 = p[0].map((_,k) => p[1][k]-p[0][k]);
  const v1 = p[1].map((_,k) => p[2][k]-p[1][k]);
  const v2 = p[2].map((_,k) => p[3][k]-p[2][k]);
  return Math.min((_vecAngle(v0,v1) + _vecAngle(v1,v2)) / 160, 1);
}
function _thumbCurl(lm) {
  const p = [1,2,3,4].map(i => [lm[i].x,lm[i].y,lm[i].z]);
  const v0=p[0].map((_,k)=>p[1][k]-p[0][k]),v1=p[1].map((_,k)=>p[2][k]-p[1][k]),v2=p[2].map((_,k)=>p[3][k]-p[2][k]);
  return Math.min((_vecAngle(v0,v1)+_vecAngle(v1,v2))/140, 1);
}
function _thumbAux(lm) {
  const tip=[lm[4].x,lm[4].y,lm[4].z], idx=[lm[5].x,lm[5].y,lm[5].z];
  const w=[lm[0].x,lm[0].y,lm[0].z], mid=[lm[9].x,lm[9].y,lm[9].z];
  const sz = Math.hypot(...w.map((_,k)=>mid[k]-w[k])) + 1e-6;
  return Math.max(0, Math.min(1, 1-(Math.hypot(...tip.map((_,k)=>idx[k]-tip[k]))/sz - 0.2)/0.5));
}
function lmToPositions(lm) {
  return [
    Math.round(_thumbCurl(lm)*1000),
    Math.round(_thumbAux(lm)*1000),
    Math.round(_curl(lm,[5,6,7,8])*1000),
    Math.round(_curl(lm,[9,10,11,12])*1000),
    Math.round(_curl(lm,[13,14,15,16])*1000),
    Math.round(_curl(lm,[17,18,19,20])*1000),
  ];
}
function emaUpdate(raw) {
  const a = mirrorAlpha;
  if (!emaVals) { emaVals = [...raw]; return [...raw]; }
  emaVals = raw.map((v,i) => Math.round(a*v + (1-a)*emaVals[i]));
  return [...emaVals];
}
function applyMirrorPositions(pos) {
  pos.forEach((v,i) => {
    sliderVals[i] = v;
    const sl = document.getElementById("sl"+i);
    if (sl) sl.value = v;
    setTileVal(i, v);
  });
  sendPositions();
  updateHandViz(sliderVals);
}

// Draw skeleton on PIP canvas (coords are mirrored to match flipped video)
const MP_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];
const FINGER_TIP_IDX = new Set([4,8,12,16,20]);
function drawSkeleton(ctx, lm, w, h) {
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "rgba(108,142,255,0.75)";
  const pt = j => ({ x:(1-lm[j].x)*w, y:lm[j].y*h });
  MP_CONNECTIONS.forEach(([a,b]) => {
    const pa=pt(a), pb=pt(b);
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  });
  lm.forEach((_,j) => {
    const {x,y} = pt(j);
    const isTip = FINGER_TIP_IDX.has(j);
    ctx.beginPath();
    ctx.arc(x, y, isTip ? 4 : 2.5, 0, Math.PI*2);
    ctx.fillStyle = isTip ? "#a78bfa" : "rgba(255,255,255,0.85)";
    ctx.fill();
  });
}

async function initHandsModel() {
  if (handsModel) return;
  handsModel = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  handsModel.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6, minTrackingConfidence:0.5 });
  const pipCanvas = document.getElementById("pipCanvas");
  const pipCtx    = pipCanvas.getContext("2d");
  handsModel.onResults(results => {
    const w = pipCanvas.width, h = pipCanvas.height;
    pipCtx.clearRect(0, 0, w, h);
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0];
      drawSkeleton(pipCtx, lm, w, h);
      applyMirrorPositions(emaUpdate(lmToPositions(lm)));
    } else {
      applyMirrorPositions(emaUpdate([0,0,0,0,0,0]));
    }
  });
  // No explicit initialize() — MediaPipe initializes lazily on first send()
}

async function toggleMirror() {
  const btn   = document.getElementById("mirrorBtn");
  const pip   = document.getElementById("mirrorPip");
  const badge = document.getElementById("mirrorBadge");
  const video = document.getElementById("pipVideo");

  if (mirrorActive) {
    mirrorActive = false;
    if (mirrorStream) { mirrorStream.getTracks().forEach(t=>t.stop()); mirrorStream=null; }
    pip.classList.remove("active");
    badge.classList.remove("active");
    btn.classList.remove("active");
    btn.innerHTML = '<span class="dot"></span>Mirror';
    emaVals = null;
    return;
  }

    btn.innerHTML = 'Starting…';
  // Don't disable — allow cancel by clicking again
  try {
    mirrorStream = await navigator.mediaDevices.getUserMedia({
      video: { width:320, height:240, facingMode:"user" }, audio:false
    });
    video.srcObject = mirrorStream;
    await video.play();
    initHandsModel(); // sync — model loads lazily on first frame
    mirrorActive = true;
    pip.classList.add("active");
    badge.classList.add("active");
    btn.classList.add("active");
    btn.innerHTML = '<span class="dot"></span>Stop Mirror';
    btn.disabled = false;
    const pipCanvas = document.getElementById("pipCanvas");
    async function mirrorFrame() {
      if (!mirrorActive) return;
      if (video.readyState >= 2) {
        pipCanvas.width  = video.videoWidth  || 320;
        pipCanvas.height = video.videoHeight || 240;
        await handsModel.send({ image: video });
      }
      requestAnimationFrame(mirrorFrame);
    }
    requestAnimationFrame(mirrorFrame);
  } catch(e) {
    btn.innerHTML = '<span class="dot"></span>Mirror';
    btn.disabled = false;
    badge.textContent = "Camera denied";
    badge.style.color = "var(--red)";
    badge.style.borderColor = "var(--red)";
    badge.classList.add("active");
    setTimeout(() => {
      badge.classList.remove("active");
      badge.textContent = "\u25c9 Mirror Active";
      badge.style.color = "";
      badge.style.borderColor = "";
    }, 3000);
  }
}

// Disable finger manual interaction while mirror active (allow it to pass through)
const _origMousedown = window.onmousedown;
document.getElementById("hand-svg").addEventListener("mousedown", e => {
  if (mirrorActive) { e.stopImmediatePropagation(); }
}, true);

connect();
updateHandViz(sliderVals);

// ── Row resize handle (poses ↕ chart) ────────────────
(function(){
  const posesEl=document.querySelector(".poses-section");
  const rh1=document.getElementById("rh1");
  let drag=null;
  rh1.addEventListener("mousedown",e=>{
    e.preventDefault();
    rh1.classList.add("dragging");
    drag={startY:e.clientY,startH:posesEl.offsetHeight};
  });
  window.addEventListener("mousemove",e=>{
    if(!drag)return;
    const delta=e.clientY-drag.startY;
    const rcol=document.getElementById("rcol");
    const newH=Math.max(100,Math.min(rcol.offsetHeight-80,drag.startH+delta));
    posesEl.style.flex="0 0 "+newH+"px";
    drawChart();
  });
  window.addEventListener("mouseup",()=>{
    if(drag){rh1.classList.remove("dragging");drag=null;}
  });
})();

// ── Column resize handles ─────────────────────────────
(function(){
  const lcol=document.getElementById("lcol");
  const rcol=document.getElementById("rcol");
  const ch1=document.getElementById("ch1");
  const ch2=document.getElementById("ch2");
  let drag=null;
  function startDrag(e,side){
    e.preventDefault();
    const startX=e.clientX,startW=side==="left"?lcol.offsetWidth:document.getElementById("ccol").offsetWidth;
    const handle=side==="left"?ch1:ch2;
    handle.classList.add("dragging");
    drag={side,startX,startW,handle};
  }
  ch1.addEventListener("mousedown",e=>startDrag(e,"left"));
  ch2.addEventListener("mousedown",e=>startDrag(e,"right"));
  window.addEventListener("mousemove",e=>{
    if(!drag)return;
    const delta=e.clientX-drag.startX;
    if(drag.side==="left"){
      lcol.style.width=Math.max(160,Math.min(520,drag.startW+delta))+"px";
    } else {
      // ch2 resizes center column
      const ccol=document.getElementById("ccol");
      ccol.style.width=Math.max(160,Math.min(600,drag.startW+delta))+"px";
    }
    drawChart();
  });
  window.addEventListener("mouseup",()=>{
    if(drag){drag.handle.classList.remove("dragging");drag=null;}
  });
})();
</script>
